name: Build HandPosMod

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c
          add-to-path: true

      - name: Install CMake
        run: sudo apt-get install -y cmake ninja-build

      - name: Configure
        run: |
          mkdir build
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26 \
            -DCMAKE_BUILD_TYPE=Release \
            -G Ninja

      - name: Build
        run: cmake --build build

      - name: Package
        run: |
          mkdir -p output
          cp build/libHandPosMod.so output/
          zip -r HandPosMod-release.zip output/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: HandPosMod-release
          path: HandPosMod-release.zip
          retention-days: 30
